name: Build-OTA-Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：1.0.0）'
        required: false
        type: string
        default: 'auto'
      use_upx:
        description: 'build with upx'
        required: false
        type: boolean
        default: true
      release_type:
        description: '发布类型（Release type）'
        required: true
        type: choice
        default: '最新正式版（latest release）'
        options:
          - '最新正式版（latest release）'
          - '预发布版（pre-release）'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build-ota:
    name: Build OTA Package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          VERSION="${{ inputs.version }}"
          
          if [ -z "$VERSION" ] || [ "$VERSION" = "auto" ]; then
            VERSION="$CURRENT_VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ================= Rust =================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      # ================= Dependencies =================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools \
            pkg-config \
            libsqlite3-dev \
            upx-ucl \
            build-essential

      # ================= Cache =================
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # ================= Version sync =================
      - name: Sync version
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" backend/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" frontend/package.json

      # ================= Build Backend =================
      - name: Build backend
        working-directory: backend
        run: |
          echo "Build x86_64 musl backend..."

          export CC_x86_64_unknown_linux_musl=musl-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc

          cargo build --release --target x86_64-unknown-linux-musl

      # ================= UPX =================
      - name: UPX compress
        if: inputs.use_upx == true
        run: |
          upx --best --lzma backend/target/x86_64-unknown-linux-musl/release/simadmin

      # ================= Node =================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ================= Frontend =================
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install
          pnpm run build

      # ================= OTA Package =================
      - name: Package OTA
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date)

          ARCH="x86_64-unknown-linux-musl"
          BINARY="backend/target/x86_64-unknown-linux-musl/release/simadmin"

          TMP=$(mktemp -d)

          cp "$BINARY" "$TMP/simadmin"
          chmod +x "$TMP/simadmin"

          mkdir -p "$TMP/www"
          cp -r frontend/dist/* "$TMP/www/"

          cat > "$TMP/meta.json" <<EOF
{
  "version": "$VERSION",
  "commit": "$COMMIT",
  "build_time": "$BUILD_TIME",
  "arch": "$ARCH"
}
EOF

          tar -czf simadmin.tar.gz -C "$TMP" .

      # ================= Release =================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: simadmin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ================= Summary =================
      - name: Summary
        run: |
          echo "## Build Success (x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Arch: x86_64-unknown-linux-musl" >> $GITHUB_STEP_SUMMARY
